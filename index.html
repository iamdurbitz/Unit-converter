<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Unit Converter</title>
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
        <div class="container">
            <div class="input-section">
                <h1 id="input-header">Metric/Imperial Unit Converter</h1>
                <input id="input-field">
                <button id="convert-btn">Convert</button>
            </div>
            <div class="result-section">
                <div class="results">
                    <h3 class="result-header">Length (Meter/Feet)</h3>
                    <p id="length-result" class="result-text">Click convert!</p>
                </div>
                <div class="results">
                    <h3 class="result-header">Volume (Liters/Gallons)</h3>
                    <p id="volume-result" class="result-text">Click convert!</p>
                </div>
                <div class="results">
                    <h3 class="result-header">Mass (Kilograms/Pounds)</h3>
                    <p id="mass-result" class="result-text">Click convert!</p>
                </div>
            </div>
        </div>
    </body>
    <script src="script.js"></script>
</html>
